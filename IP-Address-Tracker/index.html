<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./src/assets/favicon-32x32.png">
  
  <title>IP Address Tracker</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- stylesheet -->
  <link rel="stylesheet" href="src/style.css">


  <!-- Leaflet JS -->
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Scrip JS -->
  <script defer type="module" src="src/script.js"></script>

</head>
<body class="bg-gray-100 h-screen flex flex-col font">

  <!-- Header Section with Search -->
  <div class="relative h-44 md:h-52 bg-header-image bg-cover bg-center">
    <div class="max-w-md mx-auto">
      <h1 class="text-center text-white text-2xl font-medium m-5">IP Address Tracker</h1>
      
      <!-- Search Bar -->
      <form id="searchForm" class="flex gap-2 bg-white rounded-2xl shadow-lg p-0.5 w-full md:w-auto md:max-w-1xl">

        <input
          type="text"
          id="ipInput"
          placeholder="Search for any IP address or domain"
          class="flex-1 rounded-2xl px-6 py-4 text-base placeholder-gray-500 focus:outline-none focus:ring-0 text-gray-900"
        />
        <button
          type="submit"
          class="bg-gray-900 hover:bg-gray-800 hover:cursor-pointer text-white rounded-2xl px-6 py-2 transition"
        >
        <img src="./src/assets/icon-arrow.svg" alt="search icon">
        </button>

      </form>
    </div>

    <!-- Info Card - Positioned Absolutely -->
    <div class="absolute left-4 right-4 md:left-0 md:right-0 md:flex md:justify-center top-38 md:top-40 z-10">
      <div class="bg-white rounded-2xl shadow-lg p-8 w-full md:w-auto md:max-w-4xl">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
          <!-- IP Address -->
          <div class="border-r border-gray-300 md:border-r md:border-b-0">
            <p class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-2">
              IP Address
            </p>
            <p id="ipAddress" class="font-medium text-gray-900">
              <!-- IP Address -->
            </p>
          </div>

          <!-- Location -->
          <div class="border-b md:border-b-0 md:border-r border-gray-300">
            <p class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-2">
              Location
            </p>
            <p id="location" class="font-medium text-gray-900">
              <!-- Location -->
            </p>
          </div>

          <!-- Timezone -->
          <div class="border-r border-gray-300 md:border-r md:border-b-0">
            <p class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-2">
              Timezone
            </p>
            <p id="timezone" class="font-medium text-gray-900">
              <!-- Timezone -->
            </p>
          </div>

          <!-- ISP -->
          <div>
            <p class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-2">
              ISP
            </p>
            <p id="isp" class="font-medium text-gray-900">
              <!-- ISP -->
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Map Container -->
  <div class="flex-1 relative mt-20 md:mt-0">
    <div id="map" class="h-86 w-full z-0"></div>
  </div>

</body>
</html>
