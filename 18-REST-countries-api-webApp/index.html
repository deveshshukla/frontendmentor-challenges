<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries-Info.com</title>

    <link rel="stylesheet" href="style.css">

    <!-- jQuery -->
    <script defer src="https://code.jquery.com/jquery-4.0.0.slim.min.js" integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>
    <!-- JavaScript -->
    <script defer src="script.js"></script>
</head>
<!-- data-theme="light" -->
<body data-theme="dark">
    <div class="main">
        <!-- Header Section -->
         <div class="header">
            <h1 class="txtTitle">Where in the world?</h1>
            <div class="theme-toggle">🌞 Need Light?</div>
         </div>

         <div class="main-container">
            <!-- Tools Section -->
            <div class="tools">
                <div class="searchBar">
                    <div class="search-icon"></div>

                    <input type="text" class="search-input" placeholder="Search for a country...">
                </div>

                <select class="region-filter">
                    <option value="all">Filter by Region</option>
                    <option value="Africa">Africa</option>
                    <option value="Americas">Americas</option>
                    <option value="Asia">Asia</option>
                    <option value="Europe">Europe</option>
                    <option value="Oceania">Oceania</option>
                </select>
            </div>

            <!-- Countries card section -->
            <div class="cardsContainer">
                <!-- <article class="country-card">
                    <img src="./asset/placeholder.jpg" alt="Country flag">
                    <div class="info">
                        <h3>Country Name</h3>
                        <p><strong>Population:</strong> 0</p>
                        <p><strong>Region:</strong> Region</p>
                        <p><strong>Capital:</strong> Capital</p>
                    </div>
                </article> -->
            </div>
         </div>
    </div>
</body>
</html>
