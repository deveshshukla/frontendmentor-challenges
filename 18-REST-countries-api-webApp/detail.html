<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries-Info.com</title>

    <link rel="stylesheet" href="style.css">

    <!-- jQuery -->
    <script defer src="https://code.jquery.com/jquery-4.0.0.slim.min.js" integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>
    <!-- JavaScript -->
    <script defer src="script.js"></script>
    <script defer src="detailScript.js"></script>
</head>
<body data-theme="dark">
    <div class="main">
        <!-- Header Section -->
         <div class="header">
            <h1 class="txtTitle">Where in the world?</h1>
            <div class="theme-toggle">🌞 Need Light?</div>
         </div>

         <div class="detail-container">
            <div class="btnBack">
                <button>← Back</button>
            </div>

            <!-- Country detail section -->
            <div class="countryInfo-container">
                <img class="flagImg" src="./asset/placeholder.jpg" alt="country flag">

                <div class="countryInfo">
                    <h3 class="countryName">Country Name</h3>

                    <div class="common-details">
                        <div class="rightInfo">
                            <p>Native Name: <span class="nativeName">nativeName</span></p>

                            <p>Population: <span class="population">population</span></p>

                            <p>Region: <span class="region">region</span></p>

                            <p>Sub Region: <span class="subRegion">subRegion</span></p>

                            <p>Capital: <span class="capital">capital</span></p>
                        </div>

                        <div class="leftInfo">
                            <p>Top Level Domain: <span class="domain">domain</span></p>

                            <p>currencies: <span class="currency">currency</span></p>

                            <p>Languages: <span class="langs">langs</span></p>

                            <p>Area: <span class="area">area</span> &#13218;</p>

                            <p>GoogleMap: <span class="gMap">Link</span></p>
                        </div>
                    </div>

                    <h5>Border Countries: <span class="borderCountry"></span></h5>
                </div>
            </div>
         </div>
    </div>
</body>

</html>
